# -------------------------------------------------------------------------
# Admin Mutations for Projects
# -------------------------------------------------------------------------

mutation CreateProject(
  $authorId: UUID!
  $title: String!
  $description: String!
  $techStack: [String!]
  $startDate: Date!
  $endDate: Date
  $liveDemoUrl: String
  $repositoryUrl: String
  $imageUrl: String
  $published: Boolean!
  $order: Int
) @auth(expr: "auth.token.admin == true") {
  project_insert(data: {
    authorId: $authorId
    title: $title
    description: $description
    techStack: $techStack
    startDate: $startDate
    endDate: $endDate
    liveDemoUrl: $liveDemoUrl
    repositoryUrl: $repositoryUrl
    imageUrl: $imageUrl
    published: $published
    order: $order
  })
}

mutation UpdateProject(
  $id: UUID!
  $title: String
  $description: String
  $techStack: [String!]
  $startDate: Date
  $endDate: Date
  $liveDemoUrl: String
  $repositoryUrl: String
  $imageUrl: String
  $published: Boolean
  $order: Int
) @auth(expr: "auth.token.admin == true") {
  project_update(id: $id, data: {
    title: $title
    description: $description
    techStack: $techStack
    startDate: $startDate
    endDate: $endDate
    liveDemoUrl: $liveDemoUrl
    repositoryUrl: $repositoryUrl
    imageUrl: $imageUrl
    published: $published
    order: $order
  })
}

mutation DeleteProject($id: UUID!) @auth(expr: "auth.token.admin == true") {
  project_delete(id: $id)
}

