query ListAllInsights @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public as it only retrieves insights.") {
  insights {
    id
    title
    summary
    content
    audioUrl
    audioMood
    audioTitle
    tags
    createdAt
    published
    views
    author {
      displayName
      profilePictureUrl
    }
  }
}

query GetMyProjects @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public as it retrieves projects marked as published.") {
  projects(where: {published: {eq: true}}, orderBy: [{order: ASC}]) {
    id
    title
    description
    techStack
    liveDemoUrl
    repositoryUrl
    startDate
    endDate
    published
    order
    views
  }
}

query GetUserProfile($id: UUID!) @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public as user profiles are public information.") {
  user(id: $id) {
    id
    displayName
    bio
    profilePictureUrl
    githubUrl
    linkedinUrl
  }
}

query ListTimeline @auth(level: PUBLIC, insecureReason: "Timeline is public information.") {
  timelines(orderBy: [{startDate: DESC}]) {
    id
    title
    description
    startDate
    endDate
    imageUrl
    published
    views
  }
}

query GetAdminUserByEmail($email: String!) @auth(level: PUBLIC, insecureReason: "Used for admin validation securely.") {
  users(where: { email: { eq: $email }, isAdmin: { eq: true } }) {
    id
    email
    isAdmin
  }
}

query ListProjectArticles($projectId: UUID!) @auth(level: PUBLIC, insecureReason: "Project articles are public information.") {
  projectArticles(where: { projectId: { eq: $projectId }, published: { eq: true } }, orderBy: [{ createdAt: DESC }]) {
    id
    title
    createdAt
    views
  }
}

query GetProjectArticle($id: UUID!) @auth(level: PUBLIC, insecureReason: "Project articles are public information.") {
  projectArticle(id: $id) {
    id
    title
    content
    createdAt
    views
    project {
      id
      title
    }
  }
}

query GetCommentProfileByClientId($clientId: String!) @auth(level: PUBLIC, insecureReason: "Anonymous comment nickname locking requires looking up the current client's saved nickname.") {
  commentProfiles(where: { clientId: { eq: $clientId } }) {
    id
    clientId
    nickname
    lockedAt
  }
}

query ListCommentsByPost($postType: String!, $postId: UUID!) @auth(level: PUBLIC, insecureReason: "Published comment threads are public on post detail pages.") {
  comments(where: { postType: { eq: $postType }, postId: { eq: $postId } }, orderBy: [{ createdAt: ASC }]) {
    id
    nicknameSnapshot
    content
    createdAt
  }
}

query ListAllCommentsForAdmin @auth(expr: "auth.token.admin == true") {
  comments(orderBy: [{ createdAt: DESC }]) {
    id
    postType
    postId
    nicknameSnapshot
    content
    createdAt
  }
}
